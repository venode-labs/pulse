name: Bug report
description: Something broken or misbehaving.
labels: ['bug']
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: One or two sentences. The symptom, not the theory.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Commands, files or a sequence. Smaller is better.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Security Pulse version
      description: Output of `security-pulse --version`.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Distro and Plasma version
      placeholder: 'Arch Linux, Plasma 6.2.0'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        `journalctl --user -u security-pulse -n 200` or the contents of
        `~/.local/state/security-pulse/`. Redact anything you don't want
        public.
      render: shell
